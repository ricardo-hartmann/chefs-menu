<div class="card vw-100 m-auto mt-5" style="max-width: 520px;">
    <div class="card-body">
        <h4 class="card-title">Novo Prato</h4>
        <form [formGroup]="formCadastro" (ngSubmit)="enviarDados()">

            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" name="nome" id="nome" class="form-control"
                    formControlName="name" />
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Categoria</label>
                <input type="text" name="category" id="category" class="form-control"
                    formControlName="category" />
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="price" class="form-label">Preço (R$)</label>
                    <input type="number" class="form-control" id="price" formControlName="price" step="0.01"/>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="available" class="form-label">Disponível</label>
                    <input type="text" class="form-control" id="available" formControlName="available"/>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Descrição</label>
                <textarea class="form-control" id="description" formControlName="description" rows="4"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    Salvar
                </button>
                <a routerLink="/admin/dashboard" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
