<!-- Cabeçalho da página -->
<section class="container p-1">
<div class="mb-4 mt-3">
  <h1 class="fw-bold">Cardápio em destaque</h1>
  <p class="text-muted">Filtre e explore os melhores sabores da cidade</p>
  <hr />
</div>

 Painel de Filtros 
<div class="card mb-4 bg-light border-0">
  <div class="card-body">
    <h5 class="card-title">🔍 Filtros</h5>
    <form> <!--!!!! ALTERAÇÕES AQUI PRO FILTRO --> 
      <div class="row g-3 align-items-end">
        <!-- Filtro por Nome -->
        <div class="col-md-4">
          <label for="filterName" class="form-label">Nome do prato</label>
          <input
            type="text"
            class="form-control"
            id="filterName"
            formControlName="name"
            placeholder="Ex: Salada, Hambúrger..."
          />
        </div>

        <!-- Filtro por Ingresso (select com opções fixas) -->
        <div class="col-md-3">
          <label for="filterTicket" class="form-label">Tipo</label>
          <select class="form-select" id="filterTicket" formControlName="requires_ticket">
            <option value="">Todos</option>
            <option value="true">Entrada</option>
            <option value="false">Prato Principal</option>
            <option value="false">Sobremesa</option>
            <option value="false">Bebida</option>
          </select>
        </div>

        <!-- Botão de Filtrar -->
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100">Filtrar</button>
        </div>
      </div>
    </form>
  </div>
</div>
</section>

<section class="container py-2">
  <h2 class="mb-3 px-5">Menus</h2>
  @if (carregandoMenus()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="start">
        <span class="visually-hidden">Carregando...</span>
      </div>
    </div>
  } @else if (menus().length === 0) {
    <div class="alert alert-info">Nenhum menu encontrado!</div>
  } @else {
    <div class="row row-cls-1 row-cols-md-3 g-4">
      @for (menu of menus(); track $index) {
        <app-dish-card [menu]="menu"></app-dish-card>
      }
    </div>
  }
</section>
