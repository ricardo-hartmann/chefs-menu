<div class="card shadow-sm">
    <div class="card-body shadow-sm">
        <h4 class="card-title">{{menu().name}}</h4>
        <h5 class="card-text badge rounded-pill bg-dark me-2 py-2 px-3">{{menu().category}}</h5>
        <p class="card-text">{{menu().description}}</p>

        @if(menu().available == true){
        <p class="card-text">✅ Disponível</p>
        } @else {
            <p class="card-text">❌ Em breve</p>
        }
        
    </div>
    <div class="card-footer d-flex w-100 justify-content-between align-items-center">
        <small>R$ {{menu().price}}</small>
        <button class="btn btn-success" (click)="pedido()">Pedir agora</button>
    </div>
</div>
